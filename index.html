<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#EDE7F6" />
  <meta name="description" content="顾老师六月快乐，一份薰衣草紫文字粒子祝福。" />
  <title>顾老师六月快乐</title>
  <link rel="stylesheet" href="./style.css?v=particle-outline-2" />
</head>
<body>
  <canvas id="scene" aria-label="薰衣草紫动态文字粒子祝福"></canvas>

  <main class="ui">
    <section class="panel" aria-label="操作提示">
      <p class="tag">LAVENDER JUNE</p>
      <h1>顾老师六月快乐</h1>
      <p id="caption">点击文字，粒子散开后会组成下一句祝福</p>
      <div class="actions">
        <button id="nextBtn" type="button">切换下一句</button>
        <button id="copyBtn" type="button">复制链接</button>
      </div>
    </section>
  </main>

  <p class="hint">滑动会推开粒子，放开后它们会慢慢回到文字 ✦</p>
  <script src="./script.js?v=particle-outline-2"></script>
</body>
</html>
