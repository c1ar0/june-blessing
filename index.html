<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f3e8ff" />
  <meta name="description" content="顾老师六月快乐，一份淡紫色动态粒子祝福。" />
  <title>顾老师六月快乐</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="scene" aria-hidden="true"></canvas>

  <main class="page">
    <section class="card" aria-label="祝福卡片">
      <p class="eyebrow">JUNE BLESSING</p>
      <h1 id="title">顾老师六月快乐</h1>
      <p id="typed" class="message"></p>
      <div class="divider"></div>
      <p class="from">愿这个六月，温柔明亮，万事顺遂。</p>

      <div class="actions">
        <button id="wishBtn" type="button">点亮粒子</button>
        <button id="copyBtn" type="button">复制祝福链接</button>
      </div>
    </section>

    <p class="hint">点击或轻触任意位置，粒子会回应你 ✦</p>
  </main>

  <script src="./script.js"></script>
</body>
</html>
